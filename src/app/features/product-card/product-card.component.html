<mat-card appearance="outlined">
  <mat-card-header>
    <img alt="book.image" mat-card-image [src]="'/assets/images/' + book.image" />
  </mat-card-header>
  <mat-card-content>
    <p>
      {{ book.title }}
      <br />
      <span> {{ book.author | textOverflow: 18 }}</span>
    </p>
  </mat-card-content>
</mat-card>
