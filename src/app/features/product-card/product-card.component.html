<mat-card appearance="outlined">
  <mat-card-header style="max-width: 155px; max-height: 240px">
    <img alt=book.image mat-card-image [src]="'/assets/images/' + book.image" />
  </mat-card-header>
  <mat-card-content>
    <p style="text-align: center">
      {{ book.title }} <br />by
      <span style="color: #44b900"> {{ book.author | textOverflow: 18 }}</span>
    </p>
  </mat-card-content>
</mat-card>
